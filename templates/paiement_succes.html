{% extends "base.html" %}
{% block title %}Paiement réussi{% endblock %}
{% block content %}
<h1 style="font-family: 'Playfair Display', serif; margin-bottom: 0.5rem;">Paiement réussi</h1>
<p style="color: var(--text-muted); margin-bottom: 1.5rem;">
  Merci. Si le paiement est confirmé, ton annonce sera publiée automatiquement.
</p>

<div style="background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); padding: 1.25rem; max-width: 720px;">
  <h2 style="margin:0 0 0.5rem; font-size: 1.15rem;">Annonce: {{ listing.commune }}</h2>
  <p style="margin:0 0 0.75rem; color: var(--text-muted);">{{ listing.description }}</p>
  <a class="btn" href="{{ url_for('dashboard') }}">Retour au compte</a>
  <a class="btn" href="{{ url_for('maisons_page') }}" style="background: transparent; border: 2px solid var(--primary); color: var(--primary) !important; margin-left: 8px;">
    Voir Explorer
  </a>
</div>
{% endblock %}
