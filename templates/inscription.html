{% extends "base.html" %}
{% block title %}Inscription{% endblock %}
{% block extra_css %}
<style>
  .auth-box { max-width: 420px; margin: 2rem auto; }
  .auth-box h1 { font-family: 'Playfair Display', serif; margin-bottom: 1.25rem; }
  .auth-box label { display: block; font-weight: 600; margin-bottom: 0.35rem; }
  .auth-box input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 1rem;
      font-size: 1rem;
  }
  .auth-box button { width: 100%; padding: 0.85rem; margin-top: 0.25rem; }
</style>
{% endblock %}
{% block content %}
<div class="auth-box">
  <h1>Créer un compte</h1>
  <form method="POST" action="{{ url_for('inscription') }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label for="email">Email *</label>
    <input type="email" id="email" name="email" placeholder="vous@exemple.com" required>
    <label for="password">Mot de passe *</label>
    <input type="password" id="password" name="password" placeholder="Min 8 caractères" required minlength="8">
    <label for="password2">Confirmer le mot de passe *</label>
    <input type="password" id="password2" name="password2" placeholder="Répétez" required>
    <button type="submit" class="btn">Créer mon compte</button>
  </form>
  <p style="margin-top: 1.25rem; color: var(--text-muted); font-size: 0.95rem;">
    Déjà un compte ? <a href="{{ url_for('connexion') }}">Se connecter</a>
  </p>
</div>
{% endblock %}
