{% extends "layout_inner.html" %}
{% block title %}Connexion — {{ app_name }}{% endblock %}
{% block content %}
<h1 class="page-title">Connexion</h1>
<p class="page-lead">Accede a tes demandes et a l’espace vente.</p>
<form method="post" class="card-panel form-grid" style="max-width:420px;">
  <input type="hidden" name="next" value="{{ next }}" />
  <div>
    <label for="email">Email</label>
    <input id="email" name="email" type="email" required autocomplete="username" />
  </div>
  <div>
    <label for="password">Mot de passe</label>
    <input id="password" name="password" type="password" required autocomplete="current-password" />
  </div>
  <button type="submit" class="btn btn-primary" style="justify-self:start;">Se connecter</button>
</form>
<p class="muted">Comptes de demo : voir <code>DEPLOY.md</code> dans le projet.</p>
{% endblock %}
