<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paiement validé</title>
  <style>
    body{font-family:Arial,sans-serif;background:#070708;color:white;margin:0;padding:40px}
    .box{max-width:760px;margin:auto;background:#111827;padding:30px;border-radius:18px;text-align:center}
    .code{font-size:32px;font-weight:900;background:#facc15;color:#111827;padding:18px;border-radius:14px;margin:20px 0}
    a{display:block;background:#22c55e;color:white;text-decoration:none;padding:16px;border-radius:12px;font-weight:800;margin-top:18px}
    .error{color:#f87171;font-weight:700}
  </style>
</head>
<body>
  <div class="box">
    <h1>Paiement validé</h1>
    <p>Génération de votre code d’accès...</p>

    <div id="resultat">Veuillez patienter...</div>

    <a id="accessLink" href="/acces.html" style="display:none;">Accéder à la formation</a>
  </div>

  <script>
    async function genererCode(){
      const params = new URLSearchParams(window.location.search);
      const reference = params.get("reference");

      const resultat = document.getElementById("resultat");
      const accessLink = document.getElementById("accessLink");

      if(!reference){
        resultat.innerHTML = '<p class="error">Référence de paiement introuvable.</p>';
        return;
      }

      try{
        const res = await fetch("/webhook-paygenius", {
          method: "POST",
          headers: {"Content-Type":"application/json"},
          body: JSON.stringify({
            event: "payment.success",
            type: "payment.success",
            data: {
              reference: reference,
              amount: 3700,
              status: "paid",
              payment_status: "paid"
            }
          })
        });

        const data = await res.json();

        const code =
          data.code ||
          data.access_code ||
          data?.data?.code ||
          data?.payment?.code ||
          data?.result?.code;

        if(!code){
          resultat.innerHTML = '<p class="error">Code non généré. Vérifiez les logs Render.</p><pre>' + JSON.stringify(data, null, 2) + '</pre>';
          return;
        }

        resultat.innerHTML = `
          <p>Votre code d’accès :</p>
          <div class="code">${code}</div>
          <p>Copiez ce code puis cliquez sur le bouton ci-dessous.</p>
        `;

        accessLink.style.display = "block";
      }catch(e){
        resultat.innerHTML = '<p class="error">Erreur serveur : ' + e.message + '</p>';
      }
    }

    genererCode();
  </script>
</body>
</html>
